{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>

{% if erro %}
<p>{{ erro }}</p>
{% endif %}

<form method="POST">
    <input type="text" name="user" placeholder="Usuário" required>
    <input type="password" name="senha" placeholder="Senha" required>
    <button type="submit">Entrar</button>
</form>

{% endblock %}
