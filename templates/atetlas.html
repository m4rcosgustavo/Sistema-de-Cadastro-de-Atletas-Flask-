{% extends 'base.html' %}

{% block content %}
<h2>Atletas</h2>

<form method="GET">
    <input type="text" name="busca" placeholder="Buscar atleta">
    <button type="submit">Buscar</button>
</form>

<a href="/add">Adicionar Atleta</a>

<ul>
    {% for a in atletas %}
        <li>
            {{ a.nome }} - {{ a.idade }} - {{ a.esporte }}
            <a href="/edit/{{ a.id }}">Editar</a>
            <a href="/delete/{{ a.id }}">Excluir</a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
