{% extends "base.html" %}
{% block content %}
<h1>{{ 'Editar' if atleta else 'Novo' }} Atleta</h1>
<form method="POST">
    <input type="text" name="nome" placeholder="Nome" value="{{ atleta.nome if atleta else '' }}" required>
    <input type="number" name="idade" placeholder="Idade" value="{{ atleta.idade if atleta else '' }}" required>
    <input type="text" name="esporte" placeholder="Esporte" value="{{ atleta.esporte if atleta else '' }}" required>
    <button type="submit">Salvar</button>
</form>
{% endblock %}
