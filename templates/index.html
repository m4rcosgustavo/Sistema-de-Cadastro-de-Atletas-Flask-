{% extends "base.html" %}

{% block content %}
<div class="welcome">
    <h2>Bem-vindo ao Sistema de Cadastro de Atletas</h2>
    <p>Este sistema permite gerenciar atletas de forma simples e eficiente.</p>
    
    {% if not session.usuario %}
        <div class="buttons">
            <a href="/login" class="btn">Fazer Login</a>
            <a href="/cadastro" class="btn">Cadastrar-se</a>
        </div>
    {% else %}
        <div class="buttons">
            <a href="/atletas" class="btn">Ver Atletas</a>
            <a href="/add" class="btn">Adicionar Atleta</a>
        </div>
    {% endif %}
</div>
{% endblock %}
