{% extends 'base.html' %}

{% block content %}

<div class="form-container">
    <h2>Criar conta</h2>

    <p>Cadastre-se para começar.</p>

    <form method="POST">
        <input type="text" name="user" placeholder="Usuário">
        <input type="password" name="senha" placeholder="Senha">
        <button type="submit">Cadastrar</button>
    </form>
</div>

{% endblock %}
