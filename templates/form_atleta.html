{% extends 'base.html' %}

{% block content %}
<h2>Formulário</h2>

<form method="POST">
    <input type="text" name="nome" placeholder="Nome" value="{{ atleta.nome if atleta else '' }}">
    <input type="number" name="idade" placeholder="Idade" value="{{ atleta.idade if atleta else '' }}">
    <input type="text" name="esporte" placeholder="Esporte" value="{{ atleta.esporte if atleta else '' }}">
    <button type="submit">Salvar</button>
</form>

{% endblock %}
